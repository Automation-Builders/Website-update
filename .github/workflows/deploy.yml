name: Deploy to GitHub Pages

# Static site (vanilla index.html). Every push to main publishes to GitHub Pages,
# which serves it at the custom domain automationbuilders.ai (see the CNAME file).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions required by the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root (parity with the previous Vercel/legacy-Pages
          # behaviour). .git and .github are excluded automatically.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
